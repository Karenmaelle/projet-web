<body>
    <form action="">
        <form action="">

                    <div class="input-box">
                        <label for="">Sexe:</label>
                        <select name="Sexe" id="" required>

                    <div class="input-box">
                        <label for="">Relations:</label> <br><br>
                    </div>
                    <div class="box">
                        <p>
                            <input type="radio" name="relation" value="famille">Famille

                            <input type="radio" name="relation" value="collègue">Collègues

                        </p>
                    </div>
                    <div class="input-box ">

                    </div>
                    <br>
                    <button class="login-btn">Enregistrer</button>
                </fieldset>
            </section>
